repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        types: [javascript, typescript, tsx, jsx]
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: npm run format:check
        language: system
        types: [javascript, typescript, tsx, jsx, css, json]
        pass_filenames: false
